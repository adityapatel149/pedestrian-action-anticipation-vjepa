nodes: 1
tasks_per_node: 1
cpus_per_task: 1
tag: pie-vitl16
eval_name: action_anticipation_frozen
eval_file: eval_all
folder: ./your_folder/evals/vitl/pie
resume_checkpoint: true
test_only: true

experiment:
  classifier:
    num_probe_blocks: 4 
    num_heads: 16
  data:
    anticipation_time_sec:
    - 1.0
    - 3.0
    auto_augment: true
    dataset: PIE
    base_path: ./your_pie_root_dir/
    dataset_train: ./your_data/PIE_train.csv
    dataset_val: ./your_data/PIE_test.csv
    framewise_bboxes_csv: ./your_data/PIE_framewise_bboxes.csv
    frames_per_clip: 8
    frames_per_second: 15
    motion_shift: false
    num_workers: 0
    pin_memory: true
    random_resize_scale:
    - 0.4
    - 1.0
    reprob: 0.2
    resolution: 256
    train_anticipation_point:
    - 0.0
    - 0.0
    train_anticipation_time_sec:
    - 1.0
    - 3.0
  optimization:
    num_epochs: 20
    batch_size: 32
    use_bfloat16: true
    use_focal_loss: false
    use_softmax_focal_loss: true
    multihead_kwargs:
      - weight_decay: 0.0
        final_weight_decay: 0.0
        lr: 0.0
        start_lr: 0.0
        final_lr: 0.0
        warmup: 0.0
        
      - weight_decay: 0.0
        final_weight_decay: 0.0
        lr: 0.0
        start_lr: 0.0
        final_lr: 0.0
        warmup: 0.0
        
      - weight_decay: 0.0
        final_weight_decay: 0.0
        lr: 0.0
        start_lr: 0.0
        final_lr: 0.0
        warmup: 0.0

model_kwargs:
  checkpoint: ./your_vjepa2_checkpoints/vitl.pt
  module_name: evals.action_anticipation_frozen.modelcustom.vit_encoder_predictor_concat_ar
  wrapper_kwargs:
    no_predictor: false
    num_output_frames: 2
    num_steps: 1
  pretrain_kwargs:
    encoder:
      model_name: vit_large
      checkpoint_key: target_encoder
      tubelet_size: 2
      patch_size: 16
      uniform_power: true
      use_rope: true
    predictor:
      model_name: vit_predictor
      checkpoint_key: predictor
      num_frames: 64
      depth: 12
      num_heads: 12
      predictor_embed_dim: 384
      num_mask_tokens: 10
      uniform_power: true
      use_mask_tokens: true
      use_sdpa: true
      use_silu: false
      wide_silu: false
      use_rope: true
